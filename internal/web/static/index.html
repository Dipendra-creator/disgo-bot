<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>disgo dashboard</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 15px/1.5 system-ui, sans-serif;
      background: #1a1b1e; color: #e6e6e6;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; background: #25262b; border-bottom: 1px solid #333;
    }
    header h1 { font-size: 18px; margin: 0; }
    main { max-width: 760px; margin: 0 auto; padding: 24px; }
    .muted { color: #9aa0a6; }
    button {
      background: #5865f2; color: #fff; border: 0; border-radius: 6px;
      padding: 8px 14px; font-size: 14px; cursor: pointer;
    }
    button.secondary { background: #3a3b40; }
    button:disabled { opacity: .5; cursor: default; }
    select, input[type=text], input[type=number] {
      background: #2b2c31; border: 1px solid #444; border-radius: 6px;
      color: #e6e6e6; padding: 7px 9px; width: 100%;
    }
    .card { background: #25262b; border: 1px solid #333; border-radius: 10px;
      padding: 18px 20px; margin: 16px 0; }
    .card h2 { margin: 0 0 12px; font-size: 16px; }
    .field { margin: 12px 0; }
    .field label { display: block; font-weight: 600; margin-bottom: 4px; }
    .field .help { font-size: 12px; color: #9aa0a6; margin-top: 3px; }
    .row { display: flex; align-items: center; gap: 10px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #2b2c31; border: 1px solid #444; border-radius: 8px;
      padding: 10px 16px; opacity: 0; transition: opacity .2s; }
    .toast.show { opacity: 1; }
    .toast.err { border-color: #b3404a; }
    .audit-row { border-top: 1px solid #333; padding: 10px 0; font-size: 13px; }
    .audit-row:first-of-type { border-top: 0; }
    .audit-row .meta { color: #9aa0a6; }
    .audit-row code { background: #1a1b1e; padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>disgo dashboard</h1>
    <div id="user-area"></div>
  </header>
  <main>
    <div id="login-view">
      <p class="muted">Sign in with Discord to configure your servers.</p>
      <a href="/auth/login"><button>Login with Discord</button></a>
    </div>

    <div id="app-view" hidden>
      <div class="field">
        <label for="guild">Server</label>
        <select id="guild"></select>
      </div>
      <div id="modules"></div>
      <div id="audit"></div>
    </div>
  </main>
  <div id="toast" class="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
