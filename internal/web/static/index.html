<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>disgo · dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Login view: shown when there is no active session. -->
  <div id="login" class="hidden">
    <div class="login-card">
      <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16v12H5.17L4 17.17V4z" /><path d="M8 9h8M8 12h5" />
      </svg>
      <h1>disgo</h1>
      <p>Sign in to configure and manage your servers.</p>
      <a class="btn btn-primary" href="/auth/login">Continue with Discord</a>
    </div>
  </div>

  <!-- App shell: sidebar + topbar + routed content. -->
  <div id="app" class="hidden">
    <aside id="sidebar">
      <div class="brand">
        <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16v12H5.17L4 17.17V4z" /><path d="M8 9h8M8 12h5" />
        </svg>
        <span>disgo</span>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sb-foot" id="sb-foot"></div>
    </aside>

    <div id="main">
      <header id="topbar">
        <div id="picker-slot"></div>
        <div id="user-slot"></div>
      </header>
      <main id="content"></main>
    </div>
  </div>

  <div id="toast"><span class="dot"></span><span class="msg"></span></div>
  <script src="/app.js"></script>
</body>
</html>
