apiVersion: apps/v1
kind: Deployment
metadata:
  name: disgo-bot
  namespace: disgo
  labels:
    app.kubernetes.io/name: disgo-bot
spec:
  # The gateway is single-shard for now; keep one replica until sharding lands.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: disgo-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: disgo-bot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: disgo-bot
          image: ghcr.io/dipu-sharma/disgo-bot:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: disgo-config
            - secretRef:
                name: disgo-secrets
          ports:
            - name: health
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
