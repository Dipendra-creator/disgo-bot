apiVersion: v1
kind: ConfigMap
metadata:
  name: disgo-config
  namespace: disgo
data:
  DISGO_ENV: "production"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  REDIS_ENABLED: "true"
  REDIS_ADDR: "redis:6379"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "disgo"
  POSTGRES_USER: "postgres"
