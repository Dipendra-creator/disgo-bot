# Template only — do NOT commit real secrets. Apply with values injected from a
# secret manager (Sealed Secrets, External Secrets, SOPS, Vault, …):
#
#   kubectl -n disgo create secret generic disgo-secrets \
#     --from-literal=DISCORD_TOKEN=... \
#     --from-literal=DISCORD_APP_ID=... \
#     --from-literal=POSTGRES_PASSWORD=... \
#     --from-literal=SENTRY_DSN=...
apiVersion: v1
kind: Secret
metadata:
  name: disgo-secrets
  namespace: disgo
type: Opaque
stringData:
  DISCORD_TOKEN: "REPLACE_ME"
  DISCORD_APP_ID: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  SENTRY_DSN: ""
